// ─── PDF用SVG文字列生成 ──────────────────────────────────────────
function partSvgString(p) {
  // 入力画面と同じReactコンポーネントを隠しDOMにレンダリングしてSVG文字列を取得
  const container = document.createElement("div");
  container.style.cssText = "position:fixed;left:-99999px;top:0;visibility:hidden;";
  document.body.appendChild(container);
  try {
    let elem = null;
    if      (p.type==="straight") elem = React.createElement(SvgStraight, {W:p.width, H:p.height, L:p.length});
    else if (p.type==="elbow90")  elem = React.createElement(SvgElbow90,  {W:p.width, H:p.height, R:p.r, offsetAmt:p.elbowOffset?p.elbowOffsetAmt:"", offsetDir:p.elbowOffsetDir, offsetArrow:p.elbowOffsetArrow, mirror:p.mirrorDir==="left"});
    else if (p.type==="elbow45")  elem = React.createElement(SvgElbow45,  {W:p.width, H:p.height, R:p.r, offsetAmt:p.elbowOffset?p.elbowOffsetAmt:"", offsetDir:p.elbowOffsetDir, offsetArrow:p.elbowOffsetArrow, mirror:p.mirrorDir==="left"});
    else if (p.type==="scurve")   elem = React.createElement(SvgScurve,   {W:p.width, H:p.height, R:p.r, L:p.length, offsetAmt:p.elbowOffset?p.elbowOffsetAmt:"", offsetDir:p.elbowOffsetDir, offsetArrow:p.elbowOffsetArrow, mirror:p.mirrorDir==="left"});
    else if (p.type==="elbow_ldiff") elem = React.createElement(SvgElbowLdiff, {W:p.width, H:p.height, R:p.r, ldiffAmt:p.ldiffAmt, ldiffSide:p.ldiffSide, mirror:p.mirrorDir==="left"});
    else if (p.type==="elbow_rdiff") elem = React.createElement(SvgElbowRdiff, {W:p.width, H:p.height, R:p.r, ang:p.angle||"90", ldiffAmt:p.ldiffAmt, ldiffSide:p.ldiffSide, mirror:p.mirrorDir==="left"});
    else if (p.type==="hopper")   elem = React.createElement(SvgHopper,   {inW:p.inW, inH:p.inH, outW:p.outW, outH:p.outH, L:p.length, base:p.base, offset:p.offset, offsetAmt:p.offsetAmt, baseAmt:p.baseAmt, baseDir:p.baseDir, baseArrow:p.baseArrow, mirror:p.mirrorDir==="left"});
    if (!elem) return "";
    const root = ReactDOM.createRoot(container);
    root.render(elem);
    // renderは非同期なので同期的に取得するため flushSync を使う
    ReactDOM.flushSync(() => root.render(elem));
    const svgEl = container.querySelector("svg");
    const svgStr = svgEl ? svgEl.outerHTML : "";
    root.unmount();
    return svgStr;
  } finally {
    document.body.removeChild(container);
  }
}

// ─── PDF出力（html2canvas方式・日本語対応） ───────────────────────
function generatePDF(slip, system, ctx) {
  const parts = slip.parts || [];
  const partLabel = p => {
    if(!p) return {type:"",qty:"",dim:""};
    const t = PART_TYPES.find(x=>x.id===p.type)?.label||p.type;
    let d="";
    if(p.type==="straight")                        d=`${p.width||"-"}×${p.height||"-"} L=${p.length||"-"}`;
    else if(p.type==="elbow90"||p.type==="elbow45"){const os=p.elbowOffset&&p.elbowOffsetAmt?` ${p.elbowOffsetAmt}${p.elbowOffsetDir||""} ${p.elbowOffsetArrow||""}`.trim():""; d=`${p.width||"-"}×${p.height||"-"} R=${p.r||"-"}${os}`;}
    else if(p.type==="scurve"){const os=p.elbowOffset&&p.elbowOffsetAmt?` ${p.elbowOffsetAmt}${p.elbowOffsetDir||""} ${p.elbowOffsetArrow||""}`.trim():""; d=`${p.width||"-"}×${p.height||"-"} オフセット=${p.r||"-"} L=${p.length||"-"}${os}`;}
    else if(p.type==="hopper")                     d=`入口${p.inW||"-"}×${p.inH||"-"} 出口${p.outW||"-"}×${p.outH||"-"} L=${p.length||"-"} ${p.base||""}`;
    return {type:t, qty:String(p.qty||1), dim:d};
  };

  const html = `
  <div id="pdf-content" style="width:794px;padding:20px;font-family:'Meiryo','メイリオ','Hiragino Sans','Yu Gothic',sans-serif;font-size:11px;background:#fff;">
    <h2 style="text-align:center;font-size:16px;margin:0 0 10px">曲管リスト（角ダクト製作伝票）</h2>
    <table style="width:100%;border-collapse:collapse;margin-bottom:6px;">
      <tr>
        <td style="background:#e5e7eb;font-weight:bold;padding:3px 5px;border:1px solid #999;width:60px">現場名</td>
        <td style="padding:3px 5px;border:1px solid #999;width:160px">${ctx.siteName}</td>
        <td style="background:#e5e7eb;font-weight:bold;padding:3px 5px;border:1px solid #999;width:50px">フロア</td>
        <td style="padding:3px 5px;border:1px solid #999;width:120px">${ctx.floorName}</td>
        <td style="background:#e5e7eb;font-weight:bold;padding:3px 5px;border:1px solid #999;width:50px">日付</td>
        <td style="padding:3px 5px;border:1px solid #999">${slip.date||""}</td>
      </tr>
      <tr>
        <td style="background:#e5e7eb;font-weight:bold;padding:3px 5px;border:1px solid #999">エリア</td>
        <td style="padding:3px 5px;border:1px solid #999">${ctx.areaName}</td>
        <td style="background:#e5e7eb;font-weight:bold;padding:3px 5px;border:1px solid #999">系統</td>
        <td style="padding:3px 5px;border:1px solid #999">${system?.name||""}</td>
        <td style="background:#e5e7eb;font-weight:bold;padding:3px 5px;border:1px solid #999">No.</td>
        <td style="padding:3px 5px;border:1px solid #999">${slip.slipNo||""}</td>
      </tr>
    </table>
    <div style="background:#d2e3ff;font-weight:bold;padding:3px 8px;border:1px solid #999;margin-bottom:2px">系統仕様</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:8px;">
      <tr>
        ${system ? [["板厚",system.thickness+" mm"],["材質",system.material],["フランジ",system.flange],["ハゼ",system.seam]].map(([l,v])=>`
          <td style="background:#f5f5f5;font-weight:bold;padding:2px 5px;border:1px solid #999;width:55px">${l}</td>
          <td style="padding:2px 5px;border:1px solid #999">${v||""}</td>`).join("") : ""}
      </tr>
      <tr>
        ${system ? [["シール箇所",system.seal],["シール方法",system.sealMethod],["補強リブ",system.rib]].map(([l,v])=>`
          <td style="background:#f5f5f5;font-weight:bold;padding:2px 5px;border:1px solid #999">${l}</td>
          <td style="padding:2px 5px;border:1px solid #999">${v||""}</td>`).join("") : ""}
        <td colspan="2" style="border:1px solid #999"></td>
      </tr>
    </table>
    <table style="width:100%;border-collapse:collapse;margin-bottom:8px;">
      <thead>
        <tr style="background:#324f8c;color:#fff;">
          <th style="padding:4px 5px;border:1px solid #666;width:25px">No.</th>
          <th style="padding:4px 5px;border:1px solid #666;width:25px">数</th>
          <th style="padding:4px 5px;border:1px solid #666">寸法図</th>
          <th style="padding:4px 5px;border:1px solid #666;width:4px;background:#1e3a8a"></th>
          <th style="padding:4px 5px;border:1px solid #666;width:25px">No.</th>
          <th style="padding:4px 5px;border:1px solid #666;width:25px">数</th>
          <th style="padding:4px 5px;border:1px solid #666">寸法図</th>
        </tr>
      </thead>
      <tbody>
        ${Array.from({length:Math.ceil(parts.length/2)},(_,row)=>{
          const left=parts[row*2], right=parts[row*2+1];
          const l=partLabel(left), r=partLabel(right);
          const bg=row%2===0?"#fcfcfc":"#f0f0ff";
          const cell=(p,label,idx)=>p?`
            <td style="padding:2px 4px;border:1px solid #ccc;text-align:center;vertical-align:middle;font-size:12px;font-weight:bold">${idx+1}</td>
            <td style="padding:2px 4px;border:1px solid #ccc;text-align:center;vertical-align:middle;font-size:12px;font-weight:bold">${label.qty}</td>
            <td style="padding:4px;border:1px solid #ccc;text-align:center;vertical-align:top">
              <div style="font-size:12px;font-weight:bold;margin-bottom:4px">${label.type}</div>
              <div style="text-align:center">${partSvgString(p)}</div>
              <div style="font-size:11px;margin-top:4px;color:#1e3a8a;font-weight:bold">${label.dim}</div>
            </td>
          `:`
            <td style="border:1px solid #eee"></td>
            <td style="border:1px solid #eee"></td>
            <td style="border:1px solid #eee"></td>
          `;
          return`<tr style="background:${bg};page-break-inside:avoid;break-inside:avoid">
            ${cell(left,l,row*2)}
            <td style="background:#324f8c;width:4px;padding:0"></td>
            ${cell(right,r,row*2+1)}
          </tr>`;
        }).join("")}
      </tbody>
    </table>
    <div style="font-size:10px;margin-top:4px">
      製作社名: ${slip.manufacturer||""}　取付社名: ${slip.installer||""}　担当: ${slip.staff||""}　納期: ${slip.dueDate||""}
    </div>
  </div>`;

  const container = document.createElement("div");
  container.style.cssText = "position:fixed;left:-9999px;top:0;z-index:9999;width:794px;background:#fff";
  container.innerHTML = html;
  document.body.appendChild(container);

  setTimeout(()=>{
    const content = container.querySelector("#pdf-content");
    const pageW=210, pageH=297;

    // 各trのoffsetTop/offsetHeightを取得（fixed配置でもoffsetは正確）
    const trEls = Array.from(content.querySelectorAll("tbody tr"));
    const trTops = trEls.map(tr=>{
      let el=tr, top=0;
      while(el && el!==content){ top+=el.offsetTop; el=el.offsetParent; }
      return top; // px (css)
    });
    const trBots = trEls.map((tr,i)=> trTops[i] + tr.offsetHeight);
    const contentH = content.offsetHeight;
    const contentW = content.offsetWidth; // 794

    html2canvas(content, {scale:2, useCORS:true, backgroundColor:"#fff"}).then(canvas=>{
      document.body.removeChild(container);
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});

      const sc = canvas.width / contentW; // canvas px per css px
      const pxPerMm = contentW / pageW;   // css px per mm
      const totalH = contentH / pxPerMm;  // mm

      // ページ境界を行をまたがないよう計算
      const pageBreaks = [0];
      let nextBreak = pageH;
      while(nextBreak < totalH){
        let breakMm = nextBreak;
        for(let i=0;i<trTops.length;i++){
          const top = trTops[i] / pxPerMm;
          const bot = trBots[i] / pxPerMm;
          if(top < nextBreak && bot > nextBreak){
            breakMm = top; // 行の先頭で切る
            break;
          }
        }
        pageBreaks.push(breakMm);
        nextBreak = breakMm + pageH;
      }

      pageBreaks.forEach((startMm, idx)=>{
        const endMm = idx+1 < pageBreaks.length ? pageBreaks[idx+1] : totalH;
        const sliceHmm = endMm - startMm;
        const srcY = Math.round(startMm * pxPerMm * sc);
        const srcH = Math.round(sliceHmm * pxPerMm * sc);
        if(srcH <= 0) return;
        const tmp = document.createElement("canvas");
        tmp.width = canvas.width;
        tmp.height = srcH;
        tmp.getContext("2d").drawImage(canvas,0,srcY,canvas.width,srcH,0,0,canvas.width,srcH);
        if(idx>0) doc.addPage();
        doc.addImage(tmp.toDataURL("image/png"),"PNG",0,0,pageW,sliceHmm);
      });

      doc.save(`伝票_${ctx.siteName}_${system?.name||""}_${slip.date}.pdf`);
    }).catch(e=>{
      document.body.removeChild(container);
      alert("PDF出力エラー: "+e.message);
      console.error(e);
    });
  }, 300);
}

const pLabel = p => {
  const t=PART_TYPES.find(x=>x.id===p.type)?.label||p.type;
  if(p.type==="straight")                       return `${t} ${p.width||"-"}×${p.height||"-"} L${p.length||"-"}`;
  if(p.type==="elbow90"||p.type==="elbow45"){const os=p.elbowOffset&&p.elbowOffsetAmt?` ${p.elbowOffsetAmt}${p.elbowOffsetDir||""} ${p.elbowOffsetArrow||""}`.trim():""; return `${t} ${p.width||"-"}×${p.height||"-"} R${p.r||"-"}${os}`;}
  if(p.type==="scurve"){const os=p.elbowOffset&&p.elbowOffsetAmt?` ${p.elbowOffsetAmt}${p.elbowOffsetDir||""} ${p.elbowOffsetArrow||""}`.trim():""; return `${t} ${p.width||"-"}×${p.height||"-"} R${p.r||"-"} L${p.length||"-"}${os}`;}
  if(p.type==="hopper")                         return `${t} ${p.inW||"-"}×${p.inH||"-"}→${p.outW||"-"}×${p.outH||"-"} L${p.length||"-"}`;
  if(p.type==="elbow_rdiff"){return `${t} W${p.width||"-"}×H${p.height||"-"} 入口R${p.r||"-"} 出口R${p.r2||"-"} ${p.angle||90}°`;}
  if(p.type==="elbow_ldiff"){const inL=Number(p.r||0); const outL=Number(p.r||0)+(p.ldiffSide==="出口側"?Number(p.ldiffAmt||0):0); const inLdisp=p.ldiffSide==="入口側"?inL+Number(p.ldiffAmt||0):inL; return `${t} W${p.width||"-"}×H${p.height||"-"} 内R${p.r||"-"} 入口L${inLdisp} 出口L${outL}`;}
  return t;
};

// ─── SVG寸法図 ───────────────────────────────────────────────────
// 共通スタイル
const SVG_STROKE = "#1e3a5f";
const SVG_DIM    = "#c00";      // 寸法線色
const SVG_FILL   = "#dbeafe";   // ダクト塗り
const SVG_TXT    = { fontSize:"20", fontFamily:"sans-serif", fill:SVG_DIM, fontWeight:"bold" };
const SVG_LABEL  = { fontSize:"17", fontFamily:"sans-serif", fill:"#444" };

// 矢印付き寸法線ヘルパー（水平）
const DimH = ({x1,y1,x2,label,offset=0}) => {
  const y = y1 + offset;
  const mx = (x1+x2)/2;
  return (
    <g>
      <line x1={x1} y1={y} x2={x2} y2={y} stroke={SVG_DIM} strokeWidth="1" markerEnd="url(#arr)" markerStart="url(#arr)"/>
      <text x={mx} y={y-3} textAnchor="middle" {...SVG_TXT}>{label}</text>
    </g>
  );
};
// 矢印付き寸法線（垂直）
const DimV = ({x1,y1,y2,label,offset=0}) => {
  const x = x1 + offset;
  const my = (y1+y2)/2;
  return (
    <g>
      <line x1={x} y1={y1} x2={x} y2={y2} stroke={SVG_DIM} strokeWidth="1" markerEnd="url(#arr)" markerStart="url(#arr)"/>
      <text x={x-4} y={my} textAnchor="end" dominantBaseline="middle" {...SVG_TXT}>{label}</text>
    </g>
  );
};
// 引出し線（補助線）
const ExtLine = ({x1,y1,x2,y2}) => (
  <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={SVG_DIM} strokeWidth="0.6" strokeDasharray="3,2"/>
);


// オフセット方向を正規化（DNと矢印方向から実際の上下を求める）
// 100DN→ と 100UP← は同じ形状（進行方向に対してDNは下がる）
// 図は「→」方向が標準。「←」なら反転。
function normalizeElbowOffset(amt, dir, arrow) {
  if(!amt) return null;
  // 矢印が← の場合、DNとUPを反転して統一
  const effectiveDir = (arrow === "←" && dir === "DN") ? "UP"
                     : (arrow === "←" && dir === "UP") ? "DN"
                     : dir;
  return { amt: Number(amt)||0, dir: effectiveDir || "DN", arrow: arrow || "→" };
}

// SVGラッパー（矢印マーカー定義込み）
const SvgWrap = ({w=280,h=160,mirror=false,children}) => (
  <svg viewBox={`0 0 ${w} ${h}`} width="100%"
    style={{display:"block", maxWidth:"100%"}}
    xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill={SVG_DIM}/>
      </marker>
      <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#1e3a8a"/>
      </marker>
    </defs>
    {mirror
      ? <g transform={`scale(-1,1) translate(${-w},0)`}>{children}</g>
      : children
    }
  </svg>
);

// ミラー時にテキストを水平反転補正するコンポーネント
// mirror時: 位置補正 + textAnchor を end⇔start 反転して外側に配置
const MT = ({x,y,mirror,children,textAnchor,...props}) => {
  if(!mirror) return <text x={x} y={y} textAnchor={textAnchor} {...props}>{children}</text>;
  const flipped = textAnchor==="end" ? "start" : textAnchor==="start" ? "end" : "middle";
  return <text x={x} y={y} textAnchor={flipped} transform={`scale(-1,1) translate(${-2*x},0)`} {...props}>{children}</text>;
};

// ── 直管 ──────────────────────────────────────────────────────────
const SvgStraight = ({W,H,L}) => {
  const wl = W||"W", hl = H||"H", ll = L||"L";
  const f = 10; // フランジはみ出し量

  // 寸法余白
  const padL = Math.max(70, (String(wl).length + String(hl).length + 3) * 9 + 30);
  const padR = 20, padT = 40, padB = 55;
  const rw = 200, rh = 70;
  const x0 = padL, x1 = x0 + rw;
  const y0 = padT, y1 = y0 + rh;
  const svgW = x1 + padR;
  const svgH = y1 + padB;

  return (
    <SvgWrap w={svgW} h={svgH}>
      {/* ダクト本体 */}
      <rect x={x0} y={y0} width={rw} height={rh} fill={SVG_FILL} stroke={SVG_STROKE} strokeWidth="2"/>
      {/* 断面ハッチ（左面） */}
      <rect x={x0} y={y0} width={10} height={rh} fill="#93c5fd" stroke={SVG_STROKE} strokeWidth="1.5"/>
      {/* 断面ハッチ（右面） */}
      <rect x={x1-10} y={y0} width={10} height={rh} fill="#93c5fd" stroke={SVG_STROKE} strokeWidth="1.5"/>

      {/* フランジ 左（垂直にはみ出す） */}
      <line x1={x0} y1={y0-f} x2={x0} y2={y0+f} stroke={SVG_STROKE} strokeWidth="2"/>
      <line x1={x0} y1={y1-f} x2={x0} y2={y1+f} stroke={SVG_STROKE} strokeWidth="2"/>
      {/* フランジ 右（垂直にはみ出す） */}
      <line x1={x1} y1={y0-f} x2={x1} y2={y0+f} stroke={SVG_STROKE} strokeWidth="2"/>
      <line x1={x1} y1={y1-f} x2={x1} y2={y1+f} stroke={SVG_STROKE} strokeWidth="2"/>

      {/* L 寸法（水平） */}
      <ExtLine x1={x0} y1={y1+4} x2={x0} y2={y1+24}/>
      <ExtLine x1={x1} y1={y1+4} x2={x1} y2={y1+24}/>
      <DimH x1={x0} y1={y1+22} x2={x1} label={`L=${ll}`}/>

      {/* H 寸法（垂直・左側） */}
      <ExtLine x1={x0-4} y1={y0} x2={x0-padL+8} y2={y0}/>
      <ExtLine x1={x0-4} y1={y1} x2={x0-padL+8} y2={y1}/>
      <DimV x1={x0-18} y1={y0} y2={y1} label={`H=${hl}`}/>

      {/* W×H ラベル（図中央） */}
      <text x={x0+rw/2} y={y0+rh/2-10} textAnchor="middle" fontSize="17" fontFamily="sans-serif" fill="#1e3a8a" fontWeight="bold">W{wl}</text>
      <text x={x0+rw/2} y={y0+rh/2+8}  textAnchor="middle" fontSize="17" fontFamily="sans-serif" fill="#1e3a8a" fontWeight="bold">×H{hl}</text>
    </SvgWrap>
  );
};


// ── 内R違いエルボ（角度指定）────────────────────────────────────
// 45°エルボと同じ座標系を90°回転させた版
// 入口 = 水平左（ox-ros,oy）→（ox,oy）
// 出口 = 角度θ方向（ox+ros*cosT方向ではなく、弧終端）
// 中心 = (ox, oy)
// 内弧: (ox-rs, oy) → θ度回転後の点
// 外弧: (ox-ros, oy) → θ度回転後の点
const SvgElbowRdiff = ({W, H, R, ang="90", ldiffAmt="", ldiffSide="出口側", mirror=false}) => {
  const wl = W||"W", hl = H||"H", rl = R||"R";
  const w  = Math.max(Number(W)||100, 1);
  const r  = Math.max(Number(R)||0,   0);
  const cf = Math.max(Number(ldiffAmt)||0, 0);
  const BF = r + cf;
  const theta = Math.max(1, Math.min(359, Number(ang)||90));
  const rad = theta * Math.PI / 180;
  // 入口=水平(0°)、出口=θ度（反時計回り）
  // 入口側: 水平左 → (ox-r, oy) start
  // 出口側: θ回転 → (ox - r*cos(θ), oy - r*sin(θ)) end
  const SIN = Math.sin(rad), COS = Math.cos(rad);
  const largeArc = theta > 180 ? 1 : 0;

  const rs  = Math.max(Math.round(r * Math.min(200/(r+w+cf*2), 2.0)), 0);
  const ws  = Math.round(w * Math.min(200/(r+w+cf*2), 2.0));
  const ros = rs + ws;
  const scale = Math.min(200/(r+w+cf*2), 2.0);
  const CFs = Math.round(cf * scale);

  const pad = 20;
  const dimR = Math.max(200, (String(wl).length+String(hl).length+4)*11+120);
  const dimB = cf>0 ? 90 : 65;
  const fln = 8;

  // θ>90°では弧が右にもはみ出す → 右余白追加
  const rightExt = theta > 90 ? Math.round(ros * Math.max(0, Math.sin(rad - Math.PI/2))) : 0;
  // θ<90°では出口が斜め上に行くだけで上限は ros → 追加余白なし
  // θ>90°かつ180°超えると出口が下向きになるので oy の余白は標準で十分
  const ox = pad + ros + Math.max(0, rightExt);
  const oy = pad + ros;

  // 弧端点
  // 入口側（水平左）: 中心(ox,oy)から左にr/ros
  const iIn = { x: ox - rs,  y: oy };  // 内弧 入口端
  const eIn = { x: ox - ros, y: oy };  // 外弧 入口端

  // 出口側（θ度方向）: 中心から角度(π-θ)方向（SVGはY下向き）
  // θ=90°: 真上 → (ox, oy-r)
  // θ=45°: 左上45° → (ox-r*cos45, oy-r*sin45)
  const iOut = { x: Math.round(ox - rs*COS),  y: Math.round(oy - rs*SIN)  };
  const eOut = { x: Math.round(ox - ros*COS), y: Math.round(oy - ros*SIN) };

  // 延長点（出口端線に垂直な外向き方向に延長）
  // 出口端線 iOut→eOut の方向ベクトル: (edx, edy)
  // 外向き法線（弧の外側 = 左手方向）: (-edy/elen, edx/elen)
  const edx = eOut.x - iOut.x, edy = eOut.y - iOut.y;
  const elen = Math.sqrt(edx*edx+edy*edy)||1;
  // 90°の場合: iOut=(ox,oy-rs), eOut=(ox,oy-ros) → edx=0,edy=-(ros-rs)<0
  // 法線 = (-(-edy)/elen, edx/elen) = (edy<0→正, 0) → 右方向
  // ただし「外向き」= 弧の外側へ。入口が左なので出口の外向きは右(+x)方向
  const extX = -edy/elen;  // 外向き法線 x
  const extY =  edx/elen;  // 外向き法線 y
  const iOutF = { x: Math.round(iOut.x + CFs*extX), y: Math.round(iOut.y + CFs*extY) };
  const eOutF = { x: Math.round(eOut.x + CFs*extX), y: Math.round(eOut.y + CFs*extY) };

  // 入口延長（左方向）
  const CF_inlet = ldiffSide==="入口側" ? cf : 0;
  const CFis = Math.round(CF_inlet * scale);
  const inletExt = cf>0 && ldiffSide==="入口側";

  // svgW: 弧が左に広がる(ox-ros〜ox)、寸法ラベルは右(rxBase)側に伸びる
  const rxBase = Math.max(iOut.x, eOut.x, cf>0?iOutF.x:0, cf>0?eOutF.x:0, ox);
  const svgW = rxBase + dimR + 20;
  // svgH: 上方向に弧が伸びる(oy-ros)、下方向にCFis+dimB
  const svgH = oy + CFis + dimB;
  const mx = mirror;

  return (
    <SvgWrap w={svgW} h={svgH} mirror={mx}>
      {/* 塗り */}
      <path d={inletExt
        ? `M${eIn.x},${oy+CFis} L${eIn.x},${eIn.y} A${ros},${ros} 0 ${largeArc},1 ${eOut.x},${eOut.y} L${iOut.x},${iOut.y} A${rs},${rs} 0 ${largeArc},0 ${iIn.x},${iIn.y} L${iIn.x},${oy+CFis} Z`
        : `M${eIn.x},${oy} L${eIn.x},${eIn.y} A${ros},${ros} 0 ${largeArc},1 ${cf>0?eOutF.x:eOut.x},${cf>0?eOutF.y:eOut.y} L${cf>0?iOutF.x:iOut.x},${cf>0?iOutF.y:iOut.y} A${rs},${rs} 0 ${largeArc},0 ${iIn.x},${iIn.y} L${iIn.x},${oy} Z`}
        fill={SVG_FILL} stroke="none"/>

      {/* 外弧 */}
      <path d={`M${eIn.x},${eIn.y} A${ros},${ros} 0 ${largeArc},1 ${eOut.x},${eOut.y}`}
        fill="none" stroke={SVG_STROKE} strokeWidth="2"/>
      {/* 内弧 */}
      <path d={`M${iIn.x},${iIn.y} A${rs},${rs} 0 ${largeArc},1 ${iOut.x},${iOut.y}`}
        fill="none" stroke={SVG_STROKE} strokeWidth="2"/>

      {/* 入口端線（垂直）: 延長なし時のみ */}
      {!inletExt && <line x1={eIn.x} y1={oy} x2={iIn.x} y2={oy} stroke={SVG_STROKE} strokeWidth="2"/>}
      {/* 入口延長 */}
      {inletExt && <>
        <line x1={eIn.x} y1={oy} x2={eIn.x} y2={oy+CFis} stroke={SVG_STROKE} strokeWidth="2"/>
        <line x1={iIn.x} y1={oy} x2={iIn.x} y2={oy+CFis} stroke={SVG_STROKE} strokeWidth="2"/>
        <line x1={eIn.x} y1={oy+CFis} x2={iIn.x} y2={oy+CFis} stroke={SVG_STROKE} strokeWidth="2"/>
      </>}

      {/* 出口端線 or 延長 */}
      {cf>0&&ldiffSide==="出口側" ? <>
        <line x1={iOut.x} y1={iOut.y} x2={iOutF.x} y2={iOutF.y} stroke={SVG_STROKE} strokeWidth="2"/>
        <line x1={eOut.x} y1={eOut.y} x2={eOutF.x} y2={eOutF.y} stroke={SVG_STROKE} strokeWidth="2"/>
        <line x1={iOutF.x} y1={iOutF.y} x2={eOutF.x} y2={eOutF.y} stroke={SVG_STROKE} strokeWidth="2"/>
      </> : <line x1={iOut.x} y1={iOut.y} x2={eOut.x} y2={eOut.y} stroke={SVG_STROKE} strokeWidth="2"/>}

      {/* フランジ 入口 */}
      {inletExt ? <>
        <line x1={eIn.x-fln} y1={oy+CFis} x2={eIn.x+fln} y2={oy+CFis} stroke={SVG_STROKE} strokeWidth="2"/>
        <line x1={iIn.x-fln} y1={oy+CFis} x2={iIn.x+fln} y2={oy+CFis} stroke={SVG_STROKE} strokeWidth="2"/>
      </> : <>
        <line x1={eIn.x-fln} y1={oy} x2={eIn.x+fln} y2={oy} stroke={SVG_STROKE} strokeWidth="2"/>
        <line x1={iIn.x-fln} y1={oy} x2={iIn.x+fln} y2={oy} stroke={SVG_STROKE} strokeWidth="2"/>
      </>}
      {/* フランジ 出口（端線に平行） */}
      {cf>0&&ldiffSide==="出口側" ? <>
        <line x1={iOutF.x-edx/elen*fln} y1={iOutF.y-edy/elen*fln} x2={iOutF.x+edx/elen*fln} y2={iOutF.y+edy/elen*fln} stroke={SVG_STROKE} strokeWidth="2"/>
        <line x1={eOutF.x-edx/elen*fln} y1={eOutF.y-edy/elen*fln} x2={eOutF.x+edx/elen*fln} y2={eOutF.y+edy/elen*fln} stroke={SVG_STROKE} strokeWidth="2"/>
      </> : <>

const SvgElbow90 = ({W, H, R, offsetAmt="", offsetDir="", offsetArrow="", mirror=false}) => {

  const rv = Math.max(Number(R)||50, 1);
  const scale = Math.min(220 / (wv + rv), 2.0);
  const ws = Math.round(wv * scale);
  const rs = Math.round(rv * scale);

    <SvgWrap w={svgW} h={svgH} mirror={mx}>

      {/* 左端線（入口フランジ） */}
      <line x1={x0} y1={inTop-8}  x2={x0} y2={inTop+8}  stroke={SVG_STROKE} strokeWidth="2"/>
      <line x1={x0} y1={inBot-8}  x2={x0} y2={inBot+8}  stroke={SVG_STROKE} strokeWidth="2"/>
      {/* 右端線（出口フランジ） */}
      <line x1={x1} y1={outTop-8} x2={x1} y2={outTop+8} stroke={SVG_STROKE} strokeWidth="2"/>
      <line x1={x1} y1={outBot-8} x2={x1} y2={outBot+8} stroke={SVG_STROKE} strokeWidth="2"/>

      {/* 基準面マーク */}
      {(bl==="下平")&&<line x1={x0-5} y1={inBot} x2={x1+5} y2={outBot} stroke="#f59e0b" strokeWidth="1.2" strokeDasharray="5,3"/>}
      {(bl==="上平")&&<line x1={x0-5} y1={inTop} x2={x1+5} y2={outTop} stroke="#f59e0b" strokeWidth="1.2" strokeDasharray="5,3"/>}
      {bl==="芯"&&<line x1={x0-5} y1={(inTop+inBot)/2} x2={x1+5} y2={(outTop+outBot)/2} stroke="#f59e0b" strokeWidth="1.2" strokeDasharray="5,3"/>}

      {/* 左側寸法: 入口W（内側）・入口H（外側） */}
      <line x1={x0-4}  y1={inTop} x2={x0-padL+8} y2={inTop} stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
      <line x1={x0-4}  y1={inBot} x2={x0-padL+8} y2={inBot} stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
      <line x1={x0-18} y1={inTop} x2={x0-18} y2={inBot} stroke={SVG_DIM} strokeWidth="1.2" markerEnd="url(#arr)" markerStart="url(#arr)"/>
      <MT x={mx ? x1+22 : x0-22} y={(inTop+inBot)/2-20} textAnchor={mx?"start":"end"} fontSize="17" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={false}>W{iW}</MT>
      <MT x={mx ? x1+22 : x0-22} y={(inTop+inBot)/2}    textAnchor={mx?"start":"end"} fontSize="17" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={false}>×</MT>
      <MT x={mx ? x1+22 : x0-22} y={(inTop+inBot)/2+20} textAnchor={mx?"start":"end"} fontSize="17" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={false}>H{iH}</MT>

      {/* 右側寸法: 出口W・H */}
      <line x1={x1+4}  y1={outTop} x2={x1+padR-8} y2={outTop} stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
      <line x1={x1+4}  y1={outBot} x2={x1+padR-8} y2={outBot} stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
      <line x1={x1+18} y1={outTop} x2={x1+18} y2={outBot} stroke={SVG_DIM} strokeWidth="1.2" markerEnd="url(#arr)" markerStart="url(#arr)"/>
      <MT x={mx ? x0-22 : x1+22} y={(outTop+outBot)/2-20} textAnchor={mx?"end":"start"} fontSize="17" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={false}>W{oW}</MT>
      <MT x={mx ? x0-22 : x1+22} y={(outTop+outBot)/2}    textAnchor={mx?"end":"start"} fontSize="17" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={false}>×</MT>
      <MT x={mx ? x0-22 : x1+22} y={(outTop+outBot)/2+20} textAnchor={mx?"end":"start"} fontSize="17" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={false}>H{oH}</MT>

      {/* 偏り量寸法（右外側） */}
      {oa_px > 0 && offs === "左平" && <>
        <line x1={x1+4}  y1={inTop}  x2={x1+padR-8} y2={inTop}  stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
        <line x1={x1+4}  y1={inBot}  x2={x1+padR-8} y2={inBot}  stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
        <line x1={x1+52} y1={inTop}  x2={x1+52} y2={outTop} stroke={SVG_DIM} strokeWidth="1.2" markerEnd="url(#arr)" markerStart="url(#arr)"/>
        <MT x={x1+56} y={(inTop+outTop)/2} dominantBaseline="middle" fontSize="13" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={mx}>{offsetAmt}</MT>
        <line x1={x1+52} y1={outBot} x2={x1+52} y2={inBot}  stroke={SVG_DIM} strokeWidth="1.2" markerEnd="url(#arr)" markerStart="url(#arr)"/>
        <MT x={x1+56} y={(outBot+inBot)/2} dominantBaseline="middle" fontSize="13" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={mx}>{String(Number(inW||0)-Number(outW||0)-Number(offsetAmt||0)||"")}</MT>
      </>}
      {oa_px > 0 && offs === "右平" && <>
        <line x1={x1+4}  y1={inTop}  x2={x1+padR-8} y2={inTop}  stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
        <line x1={x1+4}  y1={inBot}  x2={x1+padR-8} y2={inBot}  stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
        <line x1={x1+52} y1={inTop}  x2={x1+52} y2={outTop} stroke={SVG_DIM} strokeWidth="1.2" markerEnd="url(#arr)" markerStart="url(#arr)"/>
        <MT x={x1+56} y={(inTop+outTop)/2} dominantBaseline="middle" fontSize="13" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={mx}>{String(Number(inW||0)-Number(outW||0)-Number(offsetAmt||0)||"")}</MT>
        <line x1={x1+52} y1={outBot} x2={x1+52} y2={inBot}  stroke={SVG_DIM} strokeWidth="1.2" markerEnd="url(#arr)" markerStart="url(#arr)"/>
        <MT x={x1+56} y={(outBot+inBot)/2} dominantBaseline="middle" fontSize="13" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={mx}>{offsetAmt}</MT>
      </>}

      {/* L寸法（下） */}
      <line x1={x0} y1={Math.max(inBot,outBot)+8}  x2={x0} y2={Math.max(inBot,outBot)+26} stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
      <line x1={x1} y1={Math.max(inBot,outBot)+8}  x2={x1} y2={Math.max(inBot,outBot)+26} stroke={SVG_DIM} strokeWidth="0.7" strokeDasharray="3,2"/>
      <line x1={x0} y1={Math.max(inBot,outBot)+24} x2={x1} y2={Math.max(inBot,outBot)+24} stroke={SVG_DIM} strokeWidth="1.2" markerEnd="url(#arr)" markerStart="url(#arr)"/>
      <MT x={(x0+x1)/2} y={Math.max(inBot,outBot)+38} textAnchor="middle" fontSize="16" fontFamily="sans-serif" fill={SVG_DIM} fontWeight="bold" mirror={mx}>L={ll}</MT>

      {/* 中央ラベル */}
      {(() => {
        const cy = (Math.max(inTop,outTop)+Math.min(inBot,outBot))/2;
        const cx = (x0+x1)/2;
        const hasOffset = offs && oa_px > 0;
        const dir = offs === "左平" ? "UP" : offs === "右平" ? "DOWN" : null;
        const hasBase = baseAmt && baseDir;
        const lines = [];
        if(!hasBase && bl) lines.push(bl);
        if(baseAmt) lines.push(baseAmt);
        if(hasBase) lines.push(`${baseDir} ${baseArrow}`);
        if(offs && !oa_px) lines.push(offs);
        // 偏り方向の数値は表示しない
        const totalH = lines.length * 14;
        const startY = cy - totalH/2 + 7;
        return <>
          {lines.map((line, i) => (
            <MT key={i} x={cx} y={startY + i*14} textAnchor="middle" dominantBaseline="middle" fontSize="16" fontFamily="sans-serif" fill="#1e3a8a" fontWeight="bold" mirror={mx}>{line}</MT>
          ))}
          {hasOffset && dir && offs !== "左平" && offs !== "右平" && (
            <line x1={cx+40} y1={dir==="UP"?cy+10:cy-2} x2={cx+40} y2={dir==="UP"?cy-2:cy+10} stroke="#1e3a8a" strokeWidth="1.5" markerEnd="url(#arr-blue)"/>
          )}
        </>;
      })()}
    </SvgWrap>
  );
};

// ── 図を選択して表示 ──────────────────────────────────────────────
const PartDiagram = ({form}) => {
  const {type,width,height,length,r,inW,inH,outW,outH,base,elbowOffset,elbowOffsetAmt,elbowOffsetDir,elbowOffsetArrow,mirrorDir} = form;
  const isMirror = mirrorDir === 'left';
  return (
    <div className="bg-gray-50 border border-gray-200 rounded-xl p-3 mb-3">
      {type==="straight" && <SvgStraight W={width} H={height} L={length}/>}
      {type==="elbow90"  && <SvgElbow90  W={width} H={height} R={r} offsetAmt={elbowOffset?elbowOffsetAmt:""} offsetDir={elbowOffsetDir} offsetArrow={elbowOffsetArrow} mirror={isMirror}/>}
      {type==="elbow45"  && <SvgElbow45  W={width} H={height} R={r} offsetAmt={elbowOffset?elbowOffsetAmt:""} offsetDir={elbowOffsetDir} offsetArrow={elbowOffsetArrow} mirror={isMirror}/>}
      {type==="scurve"   && <SvgScurve   W={width} H={height} R={r} L={length} offsetAmt={elbowOffset?elbowOffsetAmt:""} offsetDir={elbowOffsetDir} offsetArrow={elbowOffsetArrow} mirror={isMirror}/>}
      {type==="elbow_ldiff" && <SvgElbowLdiff W={width} H={height} R={r} ldiffAmt={form.ldiffAmt} ldiffSide={form.ldiffSide} mirror={isMirror}/>}
      {type==="elbow_rdiff" && <SvgElbowRdiff W={width} H={height} R={r} ang={form.angle||"90"} ldiffAmt={form.ldiffAmt} ldiffSide={form.ldiffSide} mirror={isMirror}/>}
      {type==="hopper"   && <SvgHopper   inW={inW} inH={inH} outW={outW} outH={outH} L={length} base={base} offset={form.offset} offsetAmt={form.offsetAmt} baseAmt={form.baseAmt} baseDir={form.baseDir} baseArrow={form.baseArrow} mirror={isMirror}/>}
    </div>
  );
};

  );
};

// ─── メインアプリ（状態管理とルーティングのみ） ───────────────────
function DuctApp() {
  const [screen,setScreen]           = useState("login");
  const [user,setUser]               = useState(null);
  const [sites]                      = useState(INITIAL_SITES);
  const [floors]                     = useState(INITIAL_FLOORS);
  const [areas]                      = useState(INITIAL_AREAS);
  const [systems,setSystems]         = useState(INITIAL_SYSTEMS);
  const [selSite,setSelSite]         = useState(null);
  const [selFloor,setSelFloor]       = useState(null);
  const [selArea,setSelArea]         = useState(null);
  const [selSystem,setSelSystem]     = useState(null);
  const [slips,setSlips]             = useState({});
  const [editSysInit,setEditSysInit] = useState(null);
  const [editPartInit,setEditPartInit]= useState(null);
  const [editPartIdx,setEditPartIdx] = useState(null);

  const siteName  = sites.find(x=>x.id===selSite)?.name||"";
  const floorName = Object.values(floors).flat().find(x=>x.id===selFloor)?.name||"";
  const areaName  = Object.values(areas).flat().find(x=>x.id===selArea)?.name||"";
  const systemObj = Object.values(systems).flat().find(x=>x.id===selSystem);
  const bc        = [siteName,floorName,areaName,systemObj?.name].filter(Boolean);

  const slipKey = `${selArea}_${selSystem}`;
  const slip = slips[slipKey] || {
    parts:[],date:new Date().toLocaleDateString("ja-JP"),
    slipNo:"No."+String(Object.keys(slips).length+1).padStart(3,"0"),
    manufacturer:"黒澤製作所",installer:"株式会社 秀風",staff:user?.name||"",dueDate:"",
  };
  const setSlip = updater => setSlips(p=>({...p,[slipKey]:updater(p[slipKey]||slip)}));

  const saveSystem = form => {
    setSystems(p=>{
      const list=p[selArea]||[];
      const exists=list.find(s=>s.id===form.id);
      return {...p,[selArea]:exists?list.map(s=>s.id===form.id?form:s):[...list,form]};
    });
    setScreen("system");
  };

  const savePart = form => {
    setSlips(p=>{
      const base=p[slipKey]||{parts:[]};
      const parts=[...(base.parts||[])];
      if(editPartIdx===null) parts.push(form); else parts[editPartIdx]=form;
      return {...p,[slipKey]:{...base,parts}};
    });
    setScreen("slip");
  };

  if(screen==="login")   return <LoginScreen onLogin={u=>{setUser(u);setScreen("site");}}/>;
  if(screen==="site")    return <ListScreen title="現場選択" items={sites}
    onSelect={s=>{setSelSite(s.id);setSelFloor(null);setSelArea(null);setSelSystem(null);setScreen("floor");}}
    onBack={null}/>;
  if(screen==="floor")   return <ListScreen title="フロア選択" items={floors[selSite]||[]} breadcrumb={[siteName]}
    onSelect={f=>{setSelFloor(f.id);setSelArea(null);setSelSystem(null);setScreen("area");}}
    onBack={()=>setScreen("site")}/>;
  if(screen==="area")    return <ListScreen title="エリア選択" items={areas[selFloor]||[]} breadcrumb={[siteName,floorName]}
    onSelect={a=>{setSelArea(a.id);setSelSystem(null);setScreen("system");}}
    onBack={()=>setScreen("floor")}/>;
  if(screen==="system")  return <SystemScreen systems={systems} areaId={selArea} breadcrumb={bc}
    onSelect={sys=>{setSelSystem(sys.id);setScreen("slip");}}
    onEdit={sys=>{setEditSysInit({...sys});setScreen("editSystem");}}
    onCopy={sys=>setSystems(p=>({...p,[selArea]:[...(p[selArea]||[]),{...sys,id:newId(),name:sys.name+"（コピー）"}]}))}
    onNew={()=>{setEditSysInit({id:newId(),name:"",thickness:"0.6",flange:"共板",seam:"ボタンパンチ",seal:"四隅",sealMethod:"シール",rib:"あり",material:"亜鉛鉄板"});setScreen("editSystem");}}
    onBack={()=>setScreen("area")}/>;
  if(screen==="editSystem") return <EditSystemScreen initial={editSysInit} onSave={saveSystem} onBack={()=>setScreen("system")}/>;
  if(screen==="slip")    return <SlipScreen slip={slip} setSlip={setSlip} system={systemObj}
    ctx={{siteName,floorName,areaName}} breadcrumb={bc}
    onAddPart={()=>{setEditPartInit({type:"straight",qty:1});setEditPartIdx(null);setScreen("editPart");}}
    onEditPart={(p,i)=>{setEditPartInit({...p});setEditPartIdx(i);setScreen("editPart");}}
    onBack={()=>setScreen("system")}/>;
  if(screen==="editPart") return <EditPartScreen initial={editPartInit} partIndex={editPartIdx}
    onSave={savePart} onBack={()=>setScreen("slip")}/>;
  return <div>Unknown screen: {screen}</div>;
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DuctApp));
  </script>
</body>
</html>
